---
name: "CLA Signature Check"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  CLASignatureCheck:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Signature Check"
        uses: contributor-assistant/github-action@v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Path to the CLA document in the repository
          CLADOCUMENT: "https://github.com/itential/itential-mcp/blob/devel/CLA.md"
          # Branch to store CLA signatures (will be created if it doesn't exist)
          CLABRANCH: "cla-signatures"
          # Allow list of users who are exempt from signing the CLA
          ALLOWLIST: "dependabot[bot],renovate[bot]"
          # Custom message for contributors who haven't signed
          CUSTOMMESSAGE: |
            Thank you for your contribution!

            Before we can review and merge your pull request, we need you to sign our Contributor License Agreement (CLA).

            **How to sign:**
            1. Read the CLA document: [CLA.md](https://github.com/itential/itential-mcp/blob/devel/CLA.md)
            2. Comment `I have read the CLA Document and I hereby sign the CLA` on this pull request

            Once you've signed, we'll be able to proceed with reviewing your contribution.

            If you have any questions about the CLA, please contact us at opensource@itential.com
          # Labels to add when CLA is signed/not signed
          SIGNEDLABEL: "cla-signed"
          NOTSIGNEDLABEL: "cla-required"
